spring:
  application:
    name: restaurant-service-api
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false

logging:
  structured:
    format:
      console: logstash

app:
  auth:
    session:
      cookie-name: ${BUSINESS_SESSION_COOKIE_NAME:BUSINESS_SESSION}
      ttl-seconds: ${BUSINESS_SESSION_TTL_SECONDS:28800}
      cookie-secure: ${BUSINESS_SESSION_COOKIE_SECURE:true}
    initial-owner:
      enabled: ${INITIAL_OWNER_ENABLED:false}
      email: ${INITIAL_OWNER_EMAIL:owner@example.com}
      password: ${INITIAL_OWNER_PASSWORD:}
      display-name: ${INITIAL_OWNER_DISPLAY_NAME:Initial Owner}
