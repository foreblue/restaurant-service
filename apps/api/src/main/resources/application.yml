spring:
  application:
    name: restaurant-service-api
  profiles:
    default: local
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:restaurant_service;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
